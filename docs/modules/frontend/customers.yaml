openapi: 3.0.3
info:
  title: Customers API
  description: |
    Customer management API endpoints for the Custom Product Designer frontend.

    ## Module Purpose
    Provides RESTful endpoints for managing customer data and order history
    from the frontend interface.

    ## Features
    - Retrieve customers with filtering options
    - Get customer order history
    - Customer search and pagination
    - Order count tracking
    - Brand association information

    ## Business Logic
    - Complex filtering through database joins
    - Order history aggregation
    - Customer-brand relationship tracking
    - Graceful error handling
  version: 1.0.0
  contact:
    name: Custom Product Designer Development Team

servers:
  - url: http://localhost:3000/api
    description: Local development
  - url: https://your-domain.com/api
    description: Production

tags:
  - name: customers
    description: Customer management operations

components:
  schemas:
    Customer:
      type: object
      properties:
        id:
          type: string
          description: Customer unique identifier
          example: "customer-123"
        name:
          type: string
          description: Customer full name
          example: "John Doe"
        email:
          type: string
          format: email
          description: Customer email address
          example: "john.doe@example.com"
        contact_number:
          type: string
          description: Customer phone number
          example: "+1234567890"
        address:
          type: string
          description: Customer address
          example: "123 Main St, City"
        orders_count:
          type: number
          description: Number of orders
          example: 5
        hasBrands:
          type: boolean
          description: Whether customer has orders with brand associations
          example: true

    CustomerOrder:
      type: object
      properties:
        id:
          type: string
          description: Order unique identifier
          example: "order-123"
        created_at:
          type: string
          format: date-time
          description: Order creation timestamp
          example: "2024-01-27T10:30:00Z"
        brand_type:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              brands:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
              product_type:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
        colors:
          type: array
          items:
            $ref: '#/components/schemas/Color'
        product_sizes:
          type: array
          items:
            $ref: '#/components/schemas/ProductSize'
        product_images:
          type: array
          items:
            $ref: '#/components/schemas/ProductImage'

    Color:
      type: object
      properties:
        id:
          type: string
          description: Color unique identifier
          example: "color-123"
        value:
          type: string
          description: Color value/name
          example: "Red"

    ProductSize:
      type: object
      properties:
        id:
          type: string
          description: Product size unique identifier
          example: "size-123"
        quantity:
          type: number
          description: Quantity for this size
          example: 2
        sizes:
          type: object
          properties:
            id:
              type: string
            value:
              type: string
              example: "M"

    ProductImage:
      type: object
      properties:
        id:
          type: string
          description: Product image unique identifier
          example: "image-123"
        url:
          type: string
          description: Image URL
          example: "https://storage.example.com/image.jpg"
        place:
          type: string
          description: Image placement position
          example: "Front - Center"

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error message
          example: "Database connection failed"
        details:
          type: string
          description: Error details
          example: "Unable to connect to database"

paths:
  /customers:
    get:
      tags:
        - customers
      summary: Get customers with filtering
      description: |
        Retrieve customers with optional filtering by product attributes.

        **Filtering Logic:**
        - Joins with product_orders, brand_type, brands, and product_type tables
        - Filters by product attributes if any filter is provided
        - Returns only customers who have matching orders when filters are applied
        - Supports pagination

        **Business Rules:**
        - Returns empty array on database errors
        - Gracefully handles missing data
        - Orders results by customer name
        - Includes order count and brand associations
      operationId: getCustomers
      parameters:
        - name: product_type
          in: query
          required: false
          schema:
            type: string
          description: Filter by product type name
        - name: brand
          in: query
          required: false
          schema:
            type: string
          description: Filter by brand name
        - name: size
          in: query
          required: false
          schema:
            type: string
          description: Filter by size value
        - name: color
          in: query
          required: false
          schema:
            type: string
          description: Filter by color value
        - name: page
          in: query
          required: false
          schema:
            type: number
            default: 1
          description: Page number for pagination
        - name: limit
          in: query
          required: false
          schema:
            type: number
            default: 10
          description: Number of items per page
      responses:
        '200':
          description: Customers retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Customer'
        '400':
          description: Invalid filter parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Database error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /customers/{customerId}/orders:
    get:
      tags:
        - customers
      summary: Get customer orders
      description: |
        Retrieve all orders for a specific customer with full product details.

        **Data Retrieval:**
        - Fetches orders with brand, type, color, size, and image information
        - Joins multiple tables for complete product details
        - Returns orders sorted by creation date (newest first)

        **Business Logic:**
        - Returns empty array if customer has no orders
        - Handles missing related data gracefully
        - Transforms nested arrays to objects for consistency
      operationId: getCustomerOrders
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: string
          description: Customer unique identifier
      responses:
        '200':
          description: Customer orders retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CustomerOrder'
        '404':
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Database error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /customers/{customerId}:
    get:
      tags:
        - customers
      summary: Get customer details
      description: |
        Retrieve detailed information for a specific customer.

        **Customer Data:**
        - Basic customer information
        - Order count summary
        - Brand association status
        - Contact information
      operationId: getCustomerDetails
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: string
          description: Customer unique identifier
      responses:
        '200':
          description: Customer details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '404':
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Database error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
