openapi: 3.0.3
info:
  title: Report API
  description: |
    Reporting and analytics service for generating business insights.

    ## Module Purpose
    Provides comprehensive reporting functionality including customer analytics,
    order statistics, and time series data for business intelligence.

    ## Features
    - Top customers analysis by order count
    - Daily order statistics and trends
    - Product type time series analysis
    - Flexible date range filtering
    - Product type-specific filtering

    ## Business Logic
    - Aggregates data from orders and customer tables
    - Supports date range filtering with inclusive boundaries
    - Provides time series data with complete date coverage
    - Returns empty arrays on database errors

  version: 1.0.0
  contact:
    name: Custom Product Designer Development Team

servers:
  - url: http://localhost:3000/api
    description: Local development
  - url: https://your-domain.com/api
    description: Production

tags:
  - name: reports
    description: Reporting and analytics operations

components:
  schemas:
    TopCustomer:
      type: object
      properties:
        id:
          type: string
          description: Customer unique identifier
          example: "123e4567-e89b-12d3-a456-426614174000"
        name:
          type: string
          description: Customer full name
          example: "John Doe"
        email:
          type: string
          format: email
          description: Customer email address
          example: "john.doe@example.com"
        count:
          type: number
          description: Number of orders
          example: 15

    DailyOrderStats:
      type: object
      properties:
        date:
          type: string
          format: date
          description: Date in YYYY-MM-DD format
          example: "2024-01-27"
        count:
          type: number
          description: Number of orders on this date
          example: 25

    ProductTypeTimeSeries:
      type: object
      properties:
        date:
          type: string
          format: date
          description: Date in YYYY-MM-DD format
          example: "2024-01-27"
        T-Shirt:
          type: number
          description: Number of T-Shirt orders
          example: 10
        Hoodie:
          type: number
          description: Number of Hoodie orders
          example: 5
        Mug:
          type: number
          description: Number of Mug orders
          example: 8

    TimeSeriesResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ProductTypeTimeSeries'
          description: Time series data with product type breakdown
        types:
          type: array
          items:
            type: string
          description: Array of all product type names
          example: ["T-Shirt", "Hoodie", "Mug"]

paths:
  /reports/top-customers:
    get:
      tags:
        - reports
      summary: Get top customers by order count
      description: |
        Get top 5 customers by order count with optional filtering.

        **Aggregation Logic:**
        - Groups orders by customer ID
        - Counts orders per customer
        - Sorts by order count descending
        - Limits to top 5 results

        **Filtering:**
        - Date range filtering on order creation date
        - Product type filtering by name
        - Only includes orders with matching product type if specified

        **Business Rules:**
        - Returns empty array on database errors
        - Handles missing customer data gracefully
        - Uses "Unknown" for missing customer names
        - Uses "No Email" for missing email addresses
      operationId: getTopCustomers
      parameters:
        - name: startDate
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Start date for filtering (YYYY-MM-DD format)
        - name: endDate
          in: query
          required: false
          schema:
            type: string
            format: date
          description: End date for filtering (YYYY-MM-DD format)
        - name: productType
          in: query
          required: false
          schema:
            type: string
          description: Filter by specific product type name
      responses:
        '200':
          description: Top customers retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TopCustomer'
              example:
                - id: "123e4567-e89b-12d3-a456-426614174000"
                  name: "John Doe"
                  email: "john.doe@example.com"
                  count: 15
                - id: "456e7890-e89b-12d3-a456-426614174111"
                  name: "Jane Smith"
                  email: "jane.smith@example.com"
                  count: 12
        '500':
          description: Database error
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                example: []

  /reports/orders-by-day:
    get:
      tags:
        - reports
      summary: Get daily order statistics
      description: |
        Get order statistics grouped by day with optional date range filtering.

        **Aggregation Logic:**
        - Groups orders by creation date (YYYY-MM-DD format)
        - Counts orders per day
        - Sorts results by date ascending

        **Filtering:**
        - Date range filtering on order creation date
        - Inclusive of both start and end dates

        **Business Rules:**
        - Returns empty array on database errors
        - Includes dates with zero orders if in range
        - Uses ISO date format for consistency
      operationId: getOrdersByDay
      parameters:
        - name: startDate
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Start date for filtering (YYYY-MM-DD format)
        - name: endDate
          in: query
          required: false
          schema:
            type: string
            format: date
          description: End date for filtering (YYYY-MM-DD format)
      responses:
        '200':
          description: Daily order statistics retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DailyOrderStats'
              example:
                - date: "2024-01-27"
                  count: 25
                - date: "2024-01-28"
                  count: 18
                - date: "2024-01-29"
                  count: 32
        '500':
          description: Database error
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                example: []

  /reports/orders-by-product-type:
    get:
      tags:
        - reports
      summary: Get product type time series data
      description: |
        Get time series data of orders grouped by product type.

        **Aggregation Logic:**
        - Groups orders by date and product type
        - Creates matrix of dates vs product types
        - Fills missing dates with zero counts
        - Ensures all product types present in each entry

        **Data Structure:**
        - Each date entry contains counts for all product types
        - Missing product types get count of 0
        - Returns array of all discovered product types

        **Filtering:**
        - Date range filtering on order creation date
        - Inclusive of both start and end dates

        **Business Rules:**
        - Returns empty data and types array on database errors
        - Handles missing product type information gracefully
        - Provides complete date coverage in range
      operationId: getOrdersByProductTypeTimeSeries
      parameters:
        - name: startDate
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Start date for filtering (YYYY-MM-DD format)
        - name: endDate
          in: query
          required: false
          schema:
            type: string
            format: date
          description: End date for filtering (YYYY-MM-DD format)
      responses:
        '200':
          description: Product type time series retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimeSeriesResponse'
              example:
                data:
                  - date: "2024-01-27"
                    "T-Shirt": 10
                    "Hoodie": 5
                    "Mug": 8
                  - date: "2024-01-28"
                    "T-Shirt": 12
                    "Hoodie": 3
                    "Mug": 10
                  - date: "2024-01-29"
                    "T-Shirt": 8
                    "Hoodie": 7
                    "Mug": 6
                types: ["T-Shirt", "Hoodie", "Mug"]
        '500':
          description: Database error
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                    example: []
                  types:
                    type: array
                    items:
                      type: string
                    example: []
