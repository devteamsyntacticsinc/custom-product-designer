openapi: 3.0.3
info:
  title: Order API
  description: |
    Order processing and management service for handling product orders and customer creation.

    ## Module Purpose
    Provides comprehensive order management functionality including order processing,
    customer creation, image handling, and activity tracking.

    ## Features
    - Complete order processing workflow
    - Customer creation and management
    - Product image upload and storage
    - Order tracking and history
    - Activity feed generation
    - Size and color management for orders

    ## Business Logic
    - Creates or updates customers based on email
    - Handles brand-type relationships for products
    - Uploads images to Supabase storage
    - Tracks order activity and generates feeds
    - Supports complex product configurations

  version: 1.0.0
  contact:
    name: Custom Product Designer Development Team

servers:
  - url: http://localhost:3000/api
    description: Local development
  - url: https://your-domain.com/api
    description: Production

tags:
  - name: orders
    description: Order management operations
  - name: customers
    description: Customer management operations
  - name: activity
    description: Activity tracking operations

components:
  schemas:
    ContactInformation:
      type: object
      required:
        - fullName
        - email
        - contactNumber
        - address
      properties:
        fullName:
          type: string
          description: Customer full name
          example: "John Doe"
        email:
          type: string
          format: email
          description: Customer email address
          example: "john.doe@example.com"
        contactNumber:
          type: string
          description: Customer phone number
          example: "+1234567890"
        address:
          type: string
          description: Customer address
          example: "123 Main St, City, State"

    SizeSelection:
      type: object
      required:
        - size
        - quantity
      properties:
        size:
          type: string
          description: Size identifier
          example: "M"
        quantity:
          type: number
          minimum: 1
          description: Quantity for this size
          example: 2

    OrderData:
      type: object
      required:
        - contactInformation
        - productTypeId
        - sizeSelection
      properties:
        contactInformation:
          $ref: '#/components/schemas/ContactInformation'
        productTypeId:
          type: string
          description: Product type identifier
          example: "1"
        brandId:
          type: string
          nullable: true
          description: Brand identifier (null for is_onlyType products)
          example: "2"
        colorId:
          type: string
          nullable: true
          description: Color identifier
          example: "3"
        sizeSelection:
          type: array
          items:
            $ref: '#/components/schemas/SizeSelection'
          description: Array of size selections
        assets:
          type: object
          description: File objects mapped by placement position
          example:
            "front-center": "file-object"
            "back-top": "file-object"

    Customer:
      type: object
      properties:
        id:
          type: string
          description: Customer unique identifier
          example: "123e4567-e89b-12d3-a456-426614174000"
        name:
          type: string
          description: Customer full name
          example: "John Doe"
        email:
          type: string
          format: email
          description: Customer email address
          example: "john.doe@example.com"
        contact_number:
          type: string
          description: Customer phone number
          example: "+1234567890"
        address:
          type: string
          description: Customer address
          example: "123 Main St, City, State"

    ProductOrder:
      type: object
      properties:
        id:
          type: string
          description: Product order unique identifier
          example: "order-123"
        customer_id:
          type: string
          description: Customer identifier
          example: "customer-123"
        brandT_id:
          type: string
          description: Brand type identifier
          example: "brand-type-123"
        color_id:
          type: string
          nullable: true
          description: Color identifier
          example: "color-123"
        created_at:
          type: string
          format: date-time
          description: Order creation timestamp
          example: "2024-01-27T10:30:00Z"

    OrderResult:
      type: object
      properties:
        customerData:
          $ref: '#/components/schemas/Customer'
        productOrderData:
          $ref: '#/components/schemas/ProductOrder'

    OrderWithCustomer:
      type: object
      properties:
        id:
          type: string
          description: Order unique identifier
          example: "order-123"
        created_at:
          type: string
          format: date-time
          description: Order creation timestamp
          example: "2024-01-27T10:30:00Z"
        customer_id:
          type: string
          description: Customer identifier
          example: "customer-123"
        customers:
          $ref: '#/components/schemas/Customer'
        brand_type:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              brands:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
              product_type:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
        colors:
          type: array
          items:
            $ref: '#/components/schemas/Color'
        product_sizes:
          type: array
          items:
            $ref: '#/components/schemas/ProductSize'
        product_images:
          type: array
          items:
            $ref: '#/components/schemas/ProductImage'

    Color:
      type: object
      properties:
        id:
          type: string
          description: Color unique identifier
          example: "color-123"
        value:
          type: string
          description: Color value/name
          example: "Red"

    ProductSize:
      type: object
      properties:
        id:
          type: string
          description: Product size unique identifier
          example: "size-123"
        productO_id:
          type: string
          description: Product order identifier
          example: "order-123"
        size_id:
          type: string
          description: Size identifier
          example: "size-m"
        quantity:
          type: number
          description: Quantity for this size
          example: 2
        sizes:
          type: object
          properties:
            id:
              type: string
            value:
              type: string
              example: "M"

    ProductImage:
      type: object
      properties:
        id:
          type: string
          description: Product image unique identifier
          example: "image-123"
        productO_id:
          type: string
          description: Product order identifier
          example: "order-123"
        url:
          type: string
          description: Image URL
          example: "https://storage.example.com/image.jpg"
        place:
          type: string
          description: Image placement position
          example: "Front - Center"

    ActivityItem:
      type: object
      properties:
        id:
          type: string
          description: Activity unique identifier
          example: "order-123"
        type:
          type: string
          enum: [order, user]
          description: Activity type
          example: "order"
        title:
          type: string
          description: Activity title
          example: "New order received"
        description:
          type: string
          description: Activity description
          example: "Order #123456 - John Doe"
        timestamp:
          type: string
          format: date-time
          description: Activity timestamp
          example: "2024-01-27T10:30:00Z"

    ActivityResponse:
      type: object
      properties:
        activities:
          type: array
          items:
            $ref: '#/components/schemas/ActivityItem'
        total:
          type: number
          description: Total number of activities
          example: 50
        totalPages:
          type: number
          description: Total number of pages
          example: 5
        currentPage:
          type: number
          description: Current page number
          example: 1

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error message
          example: "Database connection failed"
        message:
          type: string
          description: Detailed error description
          example: "Failed to process order"

paths:
  /orders:
    post:
      tags:
        - orders
      summary: Process a new order
      description: |
        Complete order processing workflow including customer creation,
        product order creation, size management, and image upload.

        **Workflow Steps:**
        1. Create or update customer based on email
        2. Get brand type ID for the product
        3. Create product order
        4. Create product sizes
        5. Upload product images to storage

        **Business Logic:**
        - Handles existing customer updates
        - Supports is_onlyType products (null brand)
        - Uploads images to Supabase storage
        - Maps image placements to descriptive names
      operationId: processOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderData'
            example:
              contactInformation:
                fullName: "John Doe"
                email: "john.doe@example.com"
                contactNumber: "+1234567890"
                address: "123 Main St, City, State"
              productTypeId: "1"
              brandId: "2"
              colorId: "3"
              sizeSelection:
                - size: "M"
                  quantity: 2
                - size: "L"
                  quantity: 1
              assets:
                "front-center": "file-object"
                "back-top": "file-object"
      responses:
        '200':
          description: Order processed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResult'
        '400':
          description: Invalid order data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Processing failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
        - orders
      summary: Get all orders
      description: |
        Retrieve all orders with full customer and product details.

        **Data Retrieval:**
        - Fetches orders with customer information
        - Includes brand, type, color, size, and image details
        - Returns orders sorted by creation date (newest first)

        **Business Logic:**
        - Handles missing related data gracefully
        - Transforms nested arrays to objects for consistency
        - Returns empty array on database errors
      operationId: getAllOrders
      responses:
        '200':
          description: Orders retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderWithCustomer'
        '500':
          description: Database error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /orders/{orderId}:
    get:
      tags:
        - orders
      summary: Get order by ID
      description: |
        Retrieve a specific order with full details.

        **Data Retrieval:**
        - Fetches single order with customer information
        - Includes all product details and associations
        - Returns comprehensive order data

        **Business Logic:**
        - Returns empty object if order not found
        - Handles missing related data gracefully
      operationId: getOrderById
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
          description: Order unique identifier
      responses:
        '200':
          description: Order retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderWithCustomer'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Database error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /orders/count:
    get:
      tags:
        - orders
      summary: Get orders count
      description: |
        Get total count of product orders in the system.

        **Business Logic:**
        - Returns 0 on database errors
        - Uses exact count method for accuracy
      operationId: getProductOrdersCount
      responses:
        '200':
          description: Count retrieved successfully
          content:
            application/json:
              schema:
                type: number
                example: 150
        '500':
          description: Database error
          content:
            application/json:
              schema:
                type: number
                example: 0

  /customers/count:
    get:
      tags:
        - customers
      summary: Get customers count
      description: |
        Get total count of customers in the system.

        **Business Logic:**
        - Returns 0 on database errors
        - Uses exact count method for accuracy
      operationId: getCustomersCount
      responses:
        '200':
          description: Count retrieved successfully
          content:
            application/json:
              schema:
                type: number
                example: 75
        '500':
          description: Database error
          content:
            application/json:
              schema:
                type: number
                example: 0

  /activity:
    get:
      tags:
        - activity
      summary: Get recent activity
      description: |
        Get paginated recent activity including orders and new customers.

        **Data Retrieval:**
        - Fetches recent orders and customers
        - Combines and sorts by timestamp
        - Implements pagination

        **Business Logic:**
        - Returns empty array on database errors
        - Combines order and user activities
        - Sorts by newest first
      operationId: getRecentActivity
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: number
            default: 1
            minimum: 1
          description: Page number for pagination
        - name: limit
          in: query
          required: false
          schema:
            type: number
            default: 10
            minimum: 1
            maximum: 100
          description: Number of items per page
      responses:
        '200':
          description: Activity retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityResponse'
        '500':
          description: Database error
          content:
            application/json:
              schema:
                type: object
                properties:
                  activities:
                    type: array
                    items:
                      $ref: '#/components/schemas/ActivityItem'
                    example: []
                  total:
                    type: number
                    example: 0
                  totalPages:
                    type: number
                    example: 0
                  currentPage:
                    type: number
                    example: 1

  /customers/{customerId}/orders:
    get:
      tags:
        - customers
      summary: Get customer orders
      description: |
        Retrieve all orders for a specific customer with full product details.

        **Data Retrieval:**
        - Fetches customer information first
        - Gets all orders for the customer
        - Includes complete product details for each order

        **Business Logic:**
        - Returns customer with empty orders if no orders found
        - Handles missing related data gracefully
      operationId: getOrdersByCustomerId
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: string
          description: Customer unique identifier
      responses:
        '200':
          description: Customer orders retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  customer:
                    $ref: '#/components/schemas/Customer'
                  orders:
                    type: array
                    items:
                      $ref: '#/components/schemas/OrderWithCustomer'
        '404':
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Database error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
